services:
  - type: web
    name: scriptovision
    env: python
    plan: pro
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 600 --keep-alive 5
    healthCheckPath: /
    disk:
      name: scriptovision-data
      mountPath: /opt/render/project/src/data
      sizeGB: 10
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: JOBS_DIR
        value: /opt/render/project/src/data/jobs
      - key: OUTPUT_DIR
        value: /opt/render/project/src/data/output
      - key: TEMP_DIR
        value: /opt/render/project/src/data/temp
